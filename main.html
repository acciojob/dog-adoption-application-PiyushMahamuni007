<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	    <form class="form-container">
        <h2>Dog Adoption Application</h2>

        <input id="name" type="text" placeholder="Name" required>
        
        <input id="phone" type="text" placeholder="Phone Number" required>
        
        <input id="address" type="text" placeholder="Address" required>

        <label>
            <input type="checkbox" value="Have you ever lived with a Dog before?">
            Have you ever lived with a Dog before?
        </label>
			<br>

        <label for="breeds">Please select your preferred breeds:</label>
        <select id="breeds" multiple>
            <option value="labrador">Siberian Husky</option>
            <option value="german-shepherd">German Shepherd</option>
            <option value="golden-retriever">Golden Retriever</option>
        </select>

        <input type="submit" value="Submit">
    </form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
